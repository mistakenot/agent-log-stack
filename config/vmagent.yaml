global:
  scrape_interval: 15s

scrape_configs:
  - job_name: victoria-logs
    static_configs:
      - targets: ["victoria-logs:9428"]

  - job_name: vector
    static_configs:
      - targets: ["vector:9598"]

  - job_name: victoria-metrics
    static_configs:
      - targets: ["victoria-metrics:8428"]

  - job_name: phoenix
    metrics_path: /metrics
    static_configs:
      - targets: ["phoenix:6006"]
