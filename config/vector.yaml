api:
  enabled: true
  address: "0.0.0.0:8686"

sources:
  otel:
    type: opentelemetry
    grpc:
      address: "0.0.0.0:4317"
    http:
      address: "0.0.0.0:4318"

  internal_metrics:
    type: internal_metrics

transforms:
  normalize_logs:
    type: remap
    inputs: ["otel.logs"]
    source: |
      .level = del(.severity_text) ?? "info"
      .level = downcase!(string!(.level))
      if exists(.resources) {
        if !exists(.app) { .app = del(.resources.app) ?? "unknown" }
        if !exists(.service) { .service = del(.resources."service.name") ?? "unknown" }
      }
      if !exists(.app) { .app = "unknown" }
      if !exists(.service) { .service = "unknown" }
      if !exists(.source) { .source = "backend" }
      if !exists(.message) { .message = "no message" }
      del(.severity_number)
      del(.source_type)
      del(.flags)
      del(.observed_timestamp)
      del(.resources)
      del(.scope)

sinks:
  victoria_logs:
    type: http
    inputs: ["normalize_logs"]
    uri: "http://victoria-logs:9428/insert/jsonline?_stream_fields=app,source,service&_msg_field=message&_time_field=timestamp"
    encoding:
      codec: json
    framing:
      method: newline_delimited
    compression: gzip
    healthcheck:
      enabled: false
    buffer:
      type: disk
      max_size: 536870912
      when_full: block

  prometheus_exporter:
    type: prometheus_exporter
    inputs: ["internal_metrics"]
    address: "0.0.0.0:9598"
